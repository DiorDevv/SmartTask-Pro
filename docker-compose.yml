services:
  postgres:
    image: postgres:16-alpine
    container_name: reja-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: reja
      POSTGRES_PASSWORD: ${DB_PASSWORD:-reja123}
      POSTGRES_DB: reja
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reja"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: reja-app
    container_name: reja-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3000"
    environment:
      DATABASE_URL: "postgresql://reja:${DB_PASSWORD:-reja123}@postgres:5432/reja"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      AUTH_TRUST_HOST: "true"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_CLIENT_SECRET: ${APPLE_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/public/uploads

volumes:
  postgres_data:
  uploads: